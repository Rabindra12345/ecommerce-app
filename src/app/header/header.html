<header class="navbar">
  <div class="logo">TaskManager</div>

  <nav class="nav-links">
    <a routerLink="/" routerLinkActive="active">Home</a>
    <a routerLink="/tasks" routerLinkActive="active">Tasks</a>
  </nav>

  <div class="user-section">
    <span class="username">Welcome RD</span>

    <button class="cart-btn" #cartBtn (click)="toggleCart()" [class.bump]="bumping">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="9" cy="21" r="1" />
        <circle cx="20" cy="21" r="1" />
        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6" />
      </svg>

      <span class="cart-count" *ngIf="cartService.totalCount > 0" [class.pop]="bumping">
        {{ cartService.totalCount }}
      </span>
    </button>
  </div>
</header>
<img #flyImage class="fly-image" [src]="flyingSrc" />
<app-cart-drawer [cartOpen]="cartOpen" (closeDrawer)="cartOpen = false"></app-cart-drawer>
