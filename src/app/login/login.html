<div class="login-page">

    <div class="login-card">

      <h2>Login</h2>
      <p class="sub">Welcome back 👋</p>

      <input type="text" placeholder="Username"
        [(ngModel)]="username" />

      <input type="password" placeholder="Password"
        [(ngModel)]="password" />

      <button (click)="login()">Login</button>

      <p class="error" *ngIf="error">
        Invalid credentials
      </p>

      <p class="hint">
        Try: admin / 1234
      </p>

    </div>

  </div>
